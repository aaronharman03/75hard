<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>75 Hard Firestore PWA</title>
    <link rel="manifest" href="manifest.json">
    
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #bb86fc;
            --text: #e0e0e0;
            --accent: #03dac6;
            --danger: #cf6679;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Progress Section */
        .progress-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .bar-label { font-size: 0.8rem; margin-bottom: 5px; display: block; opacity: 0.8; }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .daily-fill { background: var(--accent); }

        /* Day Scroller */
        .day-scroller {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            padding: 10px 0;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .day-scroller::-webkit-scrollbar { display: none; }

        .day-btn {
            min-width: 60px;
            height: 60px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .day-btn.active { border-color: var(--primary); background: #311b92; }

        /* Task List */
        .task-card {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .checkbox-custom {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            accent-color: var(--accent);
        }

        .task-content { flex-grow: 1; }
        .task-text.done { text-decoration: line-through; opacity: 0.4; }

        .task-actions { display: flex; gap: 12px; }
        .action-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 1.1rem; }

        .add-task-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-row { display: flex; gap: 10px; }
        input[type="text"] {
            flex-grow: 1;
            background: #333;
            border: 1px solid #444;
            padding: 12px;
            color: white;
            border-radius: 8px;
        }

        .add-btn {
            background: var(--primary);
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="progress-container">
        <span id="overallLabel" class="bar-label">Overall Journey (75 Days)</span>
        <div class="progress-bar"><div id="overallFill" class="progress-fill"></div></div>
        
        <span id="dailyLabel" class="bar-label">Daily Progress</span>
        <div class="progress-bar"><div id="dailyFill" class="progress-fill daily-fill"></div></div>
    </div>

    <div class="day-scroller" id="dayScroller"></div>

    <h2 id="currentDayTitle">Day 1</h2>

    <div class="task-card">
        <div id="taskList"></div>
        
        <div class="add-task-container">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="Add a task...">
                <button class="add-btn" onclick="addTask()">ADD</button>
            </div>
            <label style="font-size: 0.85rem; color: #bbb;">
                <input type="checkbox" id="repeatDaily"> Repeat for all 75 days
            </label>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
             apiKey: "AIzaSyCtLUpfhGkp2dgtzzqobQmyV84ldAYAHtM",
  authDomain: "hard-8e466.firebaseapp.com",
  projectId: "hard-8e466",
  storageBucket: "hard-8e466.firebasestorage.app",
  messagingSenderId: "1094858700275",
  appId: "1:1094858700275:web:131e781f0f77dc92d5ce86",
  measurementId: "G-6M298K02NR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let selectedDay = 1;

        function init() {
            const scroller = document.getElementById('dayScroller');
            for (let i = 1; i <= 75; i++) {
                const btn = document.createElement('div');
                btn.className = `day-btn ${i === selectedDay ? 'active' : ''}`;
                btn.innerHTML = `<span style="font-size:10px">DAY</span>${i}`;
                btn.onclick = () => selectDay(i);
                scroller.appendChild(btn);
            }
            setupDailyListener();
            setupOverallListener();
        }

        function selectDay(day) {
            selectedDay = day;
            document.querySelectorAll('.day-btn').forEach((b, idx) => b.classList.toggle('active', (idx + 1) === day));
            document.getElementById('currentDayTitle').innerText = `Day ${day}`;
            setupDailyListener();
        }

        function setupDailyListener() {
            db.collection("tasks").where("day", "==", selectedDay)
                .onSnapshot((snapshot) => {
                    const tasks = [];
                    snapshot.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
                    renderTasks(tasks);
                });
        }

        function setupOverallListener() {
            db.collection("tasks").onSnapshot((snapshot) => {
                const daysMap = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (!daysMap[data.day]) daysMap[data.day] = { total: 0, done: 0 };
                    daysMap[data.day].total++;
                    if (data.done) daysMap[data.day].done++;
                });

                let completedDays = 0;
                for (let i = 1; i <= 75; i++) {
                    if (daysMap[i] && daysMap[i].total > 0 && daysMap[i].total === daysMap[i].done) {
                        completedDays++;
                    }
                }
                const percent = (completedDays / 75) * 100;
                document.getElementById('overallFill').style.width = percent + '%';
                document.getElementById('overallLabel').innerText = `Overall Progress (${completedDays}/75 Days)`;
            });
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const repeat = document.getElementById('repeatDaily').checked;
            if (!input.value.trim()) return;

            const name = input.value;
            input.value = '';
            document.getElementById('repeatDaily').checked = false;

            if (repeat) {
                const batch = db.batch();
                for (let i = 1; i <= 75; i++) {
                    const ref = db.collection("tasks").doc();
                    batch.set(ref, { text: name, done: false, day: i });
                }
                await batch.commit();
            } else {
                await db.collection("tasks").add({ text: name, done: false, day: selectedDay });
            }
        }

        async function toggleTask(id, currentStatus) {
            await db.collection("tasks").doc(id).update({ done: !currentStatus });
        }

        async function deleteTask(id) {
            if(confirm("Delete this task?")) {
                await db.collection("tasks").doc(id).delete();
            }
        }

        async function editTask(id, oldText) {
            const newText = prompt("Edit task:", oldText);
            if (newText && newText.trim() !== "") {
                await db.collection("tasks").doc(id).update({ text: newText });
            }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.length === 0 ? '<p style="text-align:center; opacity:0.5">No tasks for today.</p>' : '';
            
            let doneCount = 0;
            tasks.forEach(task => {
                if(task.done) doneCount++;
                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerHTML = `
                    <input type="checkbox" class="checkbox-custom" ${task.done ? 'checked' : ''} onchange="toggleTask('${task.id}', ${task.done})">
                    <div class="task-content">
                        <span class="task-text ${task.done ? 'done' : ''}">${task.text}</span>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn" onclick="editTask('${task.id}', '${task.text}')">✎</button>
                        <button class="action-btn" onclick="deleteTask('${task.id}')">✕</button>
                    </div>
                `;
                list.appendChild(div);
            });
            
            const percent = tasks.length ? (doneCount / tasks.length) * 100 : 0;
            document.getElementById('dailyFill').style.width = percent + '%';
            document.getElementById('dailyLabel').innerText = `Daily Progress (${doneCount}/${tasks.length})`;
        }
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Service Worker Registered'))
      .catch(err => console.log('Service Worker Failed', err));
  });
}
        init();
    </script>
</body>
</html>
