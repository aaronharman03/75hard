<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Habit Tracker</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://th.bing.com/th/id/OIP.2U8OW5re3riRQbbGNiOY3wHaEJ?w=281&h=180&c=7&r=0&o=7&pid=1.7&rm=3">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #bb86fc;
            --text: #e0e0e0;
            --accent: #03dac6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .settings-bar {
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--card);
            padding: 12px 15px;
            border-radius: 10px;
        }

        .settings-bar label {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .settings-bar input {
            width: 70px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: var(--primary);
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            padding: 8px;
            outline: none;
        }

        .settings-bar button {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }

        .progress-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            background: var(--bg);
            padding-bottom: 10px;
            z-index: 10;
        }

        .bar-label { font-size: 0.75rem; margin-bottom: 5px; display: block; opacity: 0.8; font-weight: bold; }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.5s ease-out;
        }

        .daily-fill { background: var(--accent); }

        .day-scroller {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            padding: 10px 0;
            margin-bottom: 15px;
            -webkit-overflow-scrolling: touch;
        }
        .day-scroller::-webkit-scrollbar { display: none; }

        .day-btn {
            min-width: 55px;
            height: 55px;
            background: var(--card);
            border: 1px solid #333;
            border-radius: 10px;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            font-weight: bold;
        }

        .day-btn.active { border-color: var(--primary); background: #311b92; }

        .task-card {
            background: var(--card);
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #333;
        }

        .checkbox-custom {
            width: 26px;
            height: 26px;
            margin-right: 15px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .task-content { flex-grow: 1; display: flex; align-items: center; gap: 10px; overflow: hidden; }
        
        .task-num-badge {
            background: #333;
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 4px;
            min-width: 20px;
            text-align: center;
        }

        .task-text { font-size: 1.05rem; display: block; }
        .task-text.done { text-decoration: line-through; opacity: 0.4; }

        .task-actions { display: flex; gap: 15px; }
        .action-btn { background: none; border: none; color: #777; cursor: pointer; font-size: 1.1rem; padding: 5px; }

        .add-task-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-row { 
            display: flex; 
            gap: 10px; 
            width: 100%;
        }

        input[type="text"] {
            flex-grow: 1;
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 14px;
            color: white;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
        }

        .add-btn {
            background: var(--primary);
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }

        .options-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5px;
        }

        .num-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #999;
            font-size: 0.9rem;
        }

        .num-input {
            width: 50px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: var(--primary);
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            padding: 5px;
            outline: none;
        }

        .repeat-label {
            font-size: 0.9rem;
            color: #999;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="settings-bar">
        <label>Challenge Length:</label>
        <input type="number" id="totalDaysInput" min="1" max="365" value="75">
        <button onclick="updateTotalDays()">Set</button>
    </div>

    <div class="progress-container">
        <span id="overallLabel" class="bar-label">Overall Progress (0/0 Tasks)</span>
        <div class="progress-bar"><div id="overallFill" class="progress-fill"></div></div>
        
        <span id="dailyLabel" class="bar-label">Daily Progress</span>
        <div class="progress-bar"><div id="dailyFill" class="progress-fill daily-fill"></div></div>
    </div>

    <div class="day-scroller" id="dayScroller"></div>

    <h2 id="currentDayTitle" style="margin: 5px 0 15px 0;">Day 1</h2>

    <div class="task-card">
        <div id="taskList"></div>
        
        <div class="add-task-container">
            <div class="input-row">
                <input type="text" id="taskInput" placeholder="Add a new task...">
                <button class="add-btn" onclick="addTask()">ADD</button>
            </div>

            <div class="options-row">
                <div class="num-input-group">
                    <span>Order:</span>
                    <input type="number" id="taskOrder" class="num-input" value="1">
                </div>
                <label class="repeat-label">
                    <input type="checkbox" id="repeatDaily" style="width:16px; height:16px;"> 
                    <span id="repeatLabel">Repeat 75 Days</span>
                </label>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtLUpfhGkp2dgtzzqobQmyV84ldAYAHtM",
            authDomain: "hard-8e466.firebaseapp.com",
            projectId: "hard-8e466",
            storageBucket: "hard-8e466.firebasestorage.app",
            messagingSenderId: "1094858700275",
            appId: "1:1094858700275:web:131e781f0f77dc92d5ce86",
            measurementId: "G-6M298K02NR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let selectedDay = 1;
        let totalDays = 75;

        const savedDays = localStorage.getItem('totalDays');
        if (savedDays) {
            totalDays = parseInt(savedDays);
        }

        function init() {
            document.getElementById('totalDaysInput').value = totalDays;
            document.getElementById('repeatLabel').innerText = `Repeat ${totalDays} Days`;
            renderDayButtons();
            setupDailyListener();
            setupOverallListener();
        }

        function renderDayButtons() {
            const scroller = document.getElementById('dayScroller');
            scroller.innerHTML = '';
            for (let i = 1; i <= totalDays; i++) {
                const btn = document.createElement('div');
                btn.className = `day-btn ${i === selectedDay ? 'active' : ''}`;
                btn.innerHTML = `<span style="font-size:9px; opacity:0.7">DAY</span>${i}`;
                btn.onclick = () => selectDay(i);
                scroller.appendChild(btn);
            }
        }

        function selectDay(day) {
            selectedDay = day;
            document.querySelectorAll('.day-btn').forEach((b, idx) => b.classList.toggle('active', (idx + 1) === day));
            document.getElementById('currentDayTitle').innerText = `Day ${day}`;
            setupDailyListener();
        }

        function setupDailyListener() {
            db.collection("tasks").where("day", "==", selectedDay)
                .onSnapshot((snapshot) => {
                    const tasks = [];
                    snapshot.forEach(doc => tasks.push({ id: doc.id, ...doc.data() }));
                    renderTasks(tasks);
                });
        }

        function setupOverallListener() {
            db.collection("tasks").onSnapshot((snapshot) => {
                let totalTasks = 0;
                let completedTasks = 0;
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    totalTasks++;
                    if (data.done) completedTasks++;
                });

                const percent = totalTasks > 0 ? (completedTasks / totalTasks) * 100 : 0;
                document.getElementById('overallFill').style.width = percent + '%';
                document.getElementById('overallLabel').innerText = `Overall Progress (${completedTasks}/${totalTasks} Tasks)`;
            });
        }

        function updateTotalDays() {
            const newTotal = parseInt(document.getElementById('totalDaysInput').value);
            
            if (newTotal < 1 || newTotal > 365) {
                alert('Please enter between 1-365 days');
                document.getElementById('totalDaysInput').value = totalDays;
                return;
            }
            
            const confirmChange = confirm(`Change challenge to ${newTotal} days? Your existing tasks won't be deleted.`);
            if (!confirmChange) {
                document.getElementById('totalDaysInput').value = totalDays;
                return;
            }
            
            totalDays = newTotal;
            localStorage.setItem('totalDays', totalDays);
            
            document.getElementById('repeatLabel').innerText = `Repeat ${totalDays} Days`;
            renderDayButtons();
            
            if (selectedDay > totalDays) {
                selectDay(1);
            }
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const orderInput = document.getElementById('taskOrder');
            const repeat = document.getElementById('repeatDaily').checked;
            
            if (!input.value.trim()) return;

            const name = input.value;
            const orderNum = parseInt(orderInput.value) || 1;
            
            input.value = '';
            orderInput.value = orderNum + 1;
            document.getElementById('repeatDaily').checked = false;

            if (repeat) {
                const batch = db.batch();
                for (let i = 1; i <= totalDays; i++) {
                    const ref = db.collection("tasks").doc();
                    batch.set(ref, { text: name, done: false, day: i, order: orderNum });
                }
                await batch.commit();
            } else {
                await db.collection("tasks").add({ text: name, done: false, day: selectedDay, order: orderNum });
            }
        }

        async function toggleTask(id, currentStatus) {
            await db.collection("tasks").doc(id).update({ done: !currentStatus });
        }

        async function deleteTask(id, taskText) {
            const choice = confirm("Delete this task?\n\nOK - Just Today\nCancel - ALL Days");
            if (choice) {
                await db.collection("tasks").doc(id).delete();
            } else {
                const secondConfirm = confirm(`Delete "${taskText}" from ALL ${totalDays} days?`);
                if (secondConfirm) {
                    const snapshot = await db.collection("tasks").where("text", "==", taskText).get();
                    const batch = db.batch();
                    snapshot.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                }
            }
        }

        async function editTask(id, oldText, oldOrder) {
            const newText = prompt("Edit task text:", oldText);
            const newOrder = prompt("Edit order number:", oldOrder);
            if (newText !== null && newText.trim() !== "") {
                await db.collection("tasks").doc(id).update({ 
                    text: newText, 
                    order: parseInt(newOrder) || oldOrder 
                });
            }
        }

        function renderTasks(tasks) {
            const list = document.getElementById('taskList');
            list.innerHTML = tasks.length === 0 ? '<p style="text-align:center; opacity:0.4; margin: 20px 0;">No tasks.</p>' : '';
            
            let doneCount = 0;
            tasks.sort((a, b) => (a.order || 0) - (b.order || 0)).forEach(task => {
                if(task.done) doneCount++;
                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerHTML = `
                    <input type="checkbox" class="checkbox-custom" ${task.done ? 'checked' : ''} onchange="toggleTask('${task.id}', ${task.done})">
                    <div class="task-content">
                        <span class="task-num-badge">${task.order || 0}</span>
                        <span class="task-text ${task.done ? 'done' : ''}">${task.text}</span>
                    </div>
                    <div class="task-actions">
                        <button class="action-btn" onclick="editTask('${task.id}', '${task.text}', ${task.order || 0})">✎</button>
                        <button class="action-btn" onclick="deleteTask('${task.id}', '${task.text}')" style="color:#555">✕</button>
                    </div>
                `;
                list.appendChild(div);
            });
            
            const percent = tasks.length ? (doneCount / tasks.length) * 100 : 0;
            document.getElementById('dailyFill').style.width = percent + '%';
            document.getElementById('dailyLabel').innerText = `Daily Progress (${doneCount}/${tasks.length})`;
        }

        init();
    </script>
</body>
</html>
